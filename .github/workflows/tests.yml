name: Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        package: [frontend, admin, backend]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Run unit tests
        run: |
          cd packages/${{ matrix.package }}
          yarn test:coverage || yarn test
        continue-on-error: true
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./packages/${{ matrix.package }}/coverage/coverage-final.json
          flags: ${{ matrix.package }}
          name: ${{ matrix.package }}-coverage
        continue-on-error: true

  e2e-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Start frontend
        run: |
          cd packages/frontend
          yarn build
          yarn start &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
      
      - name: Start backend
        run: |
          cd packages/backend
          yarn build
          yarn start &
        env:
          PORT: 5000
      
      - name: Wait for servers
        run: |
          npx wait-on http://localhost:3000 http://localhost:5000 -t 60000
      
      - name: Start admin panel
        run: |
          cd packages/admin
          yarn build
          # Start preview server in background
          nohup npx vite preview --port 3002 --host 0.0.0.0 > /tmp/admin-preview.log 2>&1 &
          echo $! > /tmp/admin-pid.txt
          # Wait a bit for server to start
          sleep 3
          # Verify server started
          for i in {1..10}; do
            if curl -f http://localhost:3002 > /dev/null 2>&1; then
              echo "✅ Admin panel started successfully on port 3002"
              exit 0
            fi
            echo "Waiting for admin panel... attempt $i/10"
            sleep 2
          done
          echo "⚠️ Admin panel may not be ready, but continuing..."
          cat /tmp/admin-preview.log || true
        continue-on-error: true
      
      - name: Verify admin panel
        run: |
          if curl -f http://localhost:3002 > /dev/null 2>&1; then
            echo "✅ Admin panel is accessible"
          else
            echo "⚠️ Admin panel not accessible - admin tests may be skipped"
          fi
        continue-on-error: true
      
      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
        env:
          CYPRESS_baseUrl: http://localhost:3000
          CYPRESS_ADMIN_URL: http://localhost:3002
          # NOTE: Admin login tests use TEST-ONLY credentials and intercept API calls.
          # Real admin credentials are NOT used - all API calls are mocked.
          # These env vars are kept for documentation but are not actually used in tests.
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      
      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
      
      - name: Upload Cypress videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: cypress/videos

